# Simple workflow for deploying static content to GitHub Pages
name: Deploy React Three Fiber Site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ['main'] # Change to 'master' if your main branch is named master

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets the GITHUB_TOKEN permissions to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment to prevent race conditions
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Or whatever Node version you are targeting
          cache: 'npm' # Automates dependency caching for faster builds

      - name: Install dependencies
        run: npm ci # Ensures a clean, predictable install from your package-lock.json

      - name: Build site
        run: npm run build

      - name: Upload production artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Vite builds to the 'dist' folder by default

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
